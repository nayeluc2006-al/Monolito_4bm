stages:
  - restore
  - build
  - test
  - publish
  - deploy

variables:
  SOLUTION_NAME: "Monolito4bm.sln"
  PROJECT_PATH: "Monolito_4bm/Monolito_4bm"
  PUBLISH_PATH: "publish"
  IIS_PATH: "C:\\inetpub\\wwwroot\\Monolito"

restore:
  stage: restore
  tags:
    - windows
  script:
    - dotnet restore $env:SOLUTION_NAME

build:
  stage: build
  tags:
    - windows
  script:
    - dotnet build $env:SOLUTION_NAME --configuration Release --no-restore

test:
  stage: test
  tags:
    - windows
  script:
    - dotnet test $env:SOLUTION_NAME --configuration Release --no-build
  allow_failure: true

publish:
  stage: publish
  tags:
    - windows
  script:
    - dotnet publish $env:PROJECT_PATH -c Release -o $env:PUBLISH_PATH

deploy:
  stage: deploy
  tags:
    - windows
  script:
    - if (!(Test-Path $env:IIS_PATH)) { New-Item -ItemType Directory -Path $env:IIS_PATH }
    - Copy-Item -Path "$env:PUBLISH_PATH\\*" -Destination $env:IIS_PATH -Recurse -Force
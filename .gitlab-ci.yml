stages:
  - restore
  - build
  - test
  - publish
  - deploy

variables:
  PUBLISH_PATH: "publish"
  IIS_PATH: "C:\\inetpub\\wwwroot\\Monolito"

restore:
  stage: restore
  tags:
    - windows
  script:
    - cd "$env:CI_PROJECT_DIR"
    - $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
    - if ($null -eq $sln) { throw "No se encontró ningún archivo .sln" }
    - C:\Tools\nuget\nuget.exe restore "$($sln.FullName)"

bbuild:
  stage: build
  tags:
    - windows
  script:
    - $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
    - if (!(Test-Path $vswhere)) { throw "No se encontró vswhere.exe. Instala Visual Studio Build Tools 2022." }
    - $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
    - if (!(Test-Path $msbuild)) { throw "No se encontró MSBuild." }
    - $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
    - if ($null -eq $sln) { throw "No se encontró ningún archivo .sln" }
    - '& $msbuild "$($sln.FullName)" /p:Configuration=Release /restore'
    
test:
  stage: test
  tags:
    - windows
  script:
    - echo "Sin pruebas configuradas"
  allow_failure: true

publish:
  stage: publish
  tags:
    - windows
  script:
    - $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
    - if (!(Test-Path $msbuild)) { $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe" }
    - if (!(Test-Path $msbuild)) { throw "No se encontró MSBuild de Visual Studio" }
    - $project = Get-ChildItem -Path . -Filter *.csproj -Recurse | Where-Object { $_.FullName -match "Monolito_4bm" } | Select-Object -First 1
    - if (Test-Path "$env:PUBLISH_PATH") { Remove-Item "$env:PUBLISH_PATH" -Recurse -Force }
    - '& $msbuild "$($project.FullName)" /p:Configuration=Release /p:WebPublishMethod=FileSystem /p:DeleteExistingFiles=True /p:publishUrl="$env:CI_PROJECT_DIR\$env:PUBLISH_PATH"'
  artifacts:
    paths:
      - publish/
    expire_in: 1 week

deploy:
  stage: deploy
  tags:
    - windows
  dependencies:
    - publish
  script:
    - if (!(Test-Path "$env:IIS_PATH")) { New-Item -ItemType Directory -Path "$env:IIS_PATH" -Force }
    - Remove-Item "$env:IIS_PATH\*" -Recurse -Force -ErrorAction SilentlyContinue
    - Copy-Item -Path "$env:PUBLISH_PATH\*" -Destination "$env:IIS_PATH" -Recurse -Force
  only:
    - main
stages:
  - restore
  - build
  - test
  - publish
  - deploy

variables:
  PUBLISH_PATH: "publish"
  IIS_PATH: "C:\\inetpub\\wwwroot\\Monolito"

restore:
  stage: restore
  tags:
    - windows
  script:
    - $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
    - if ($null -eq $sln) { throw "No se encontró ningún archivo .sln" }
    - dotnet restore "$($sln.FullName)"

build:
  stage: build
  tags:
    - windows
  script:
    - $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
    - if ($null -eq $sln) { throw "No se encontró ningún archivo .sln" }
    - dotnet build "$($sln.FullName)" --configuration Release --no-restore

test:
  stage: test
  tags:
    - windows
  script:
    - $sln = Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object -First 1
    - if ($null -eq $sln) { throw "No se encontró ningún archivo .sln" }
    - dotnet test "$($sln.FullName)" --configuration Release --no-build
  allow_failure: true

publish:
  stage: publish
  tags:
    - windows
  script:
    - $project = Get-ChildItem -Path . -Filter *.csproj -Recurse | Where-Object { $_.FullName -notmatch "\\bin\\|\\obj\\|Test|Tests" } | Select-Object -First 1
    - if ($null -eq $project) { throw "No se encontró ningún archivo .csproj" }
    - if (Test-Path "$env:PUBLISH_PATH") { Remove-Item "$env:PUBLISH_PATH" -Recurse -Force }
    - dotnet publish "$($project.FullName)" --configuration Release --output "$env:PUBLISH_PATH"
  artifacts:
    paths:
      - publish/
    expire_in: 1 week

deploy:
  stage: deploy
  tags:
    - windows
  dependencies:
    - publish
  script:
    - if (!(Test-Path "$env:IIS_PATH")) { New-Item -ItemType Directory -Path "$env:IIS_PATH" -Force }
    - Remove-Item "$env:IIS_PATH\*" -Recurse -Force -ErrorAction SilentlyContinue
    - Copy-Item -Path "$env:PUBLISH_PATH\*" -Destination "$env:IIS_PATH" -Recurse -Force
  only:
    - main